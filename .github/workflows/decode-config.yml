name: Decode to ProxyPay (Python)

on:
  workflow_dispatch:
  push:
    paths:
      - 'config.txt'

jobs:
  decode:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    
    steps:
    - uses: actions/checkout@v4
      
    - name: Decode with Python
      run: |
        python3 << 'PYTHON_SCRIPT'
        import base64
        import gzip
        import zlib
        import sys
        
        print("🔓 Декодирование Base64...")
        
        # Читаем файл
        with open('config.txt', 'r') as f:
            encoded = f.read().strip()
        
        # Декодируем Base64
        decoded_bytes = base64.b64decode(encoded)
        
        # Пробуем разные методы распаковки
        result = None
        
        # Метод 1: Обычный текст
        try:
            result = decoded_bytes.decode('utf-8')
            print("✅ Обычный Base64 текст")
        except UnicodeDecodeError:
            pass
        
        # Метод 2: Gzip
        if not result:
            try:
                result = gzip.decompress(decoded_bytes).decode('utf-8')
                print("✅ Распаковано через Gzip")
            except:
                pass
        
        # Метод 3: Zlib
        if not result:
            try:
                result = zlib.decompress(decoded_bytes).decode('utf-8')
                print("✅ Распаковано через Zlib")
            except:
                pass
        
        # Метод 4: Zlib с отрицательным wbits (raw deflate)
        if not result:
            try:
                result = zlib.decompress(decoded_bytes, -zlib.MAX_WBITS).decode('utf-8')
                print("✅ Распаковано через Zlib (raw)")
            except:
                pass
        
        if not result:
            print("❌ Не удалось декодировать")
            print(f"Первые 50 байт: {decoded_bytes[:50]}")
            sys.exit(1)
        
        # Сохраняем
        with open('proxypay.txt', 'w', encoding='utf-8') as f:
            f.write(result)
        
        # Статистика
        lines = result.strip().split('\n')
        vless = sum(1 for l in lines if l.startswith('vless://'))
        vmess = sum(1 for l in lines if l.startswith('vmess://'))
        trojan = sum(1 for l in lines if l.startswith('trojan://'))
        ss = sum(1 for l in lines if l.startswith('ss://'))
        
        print(f"\n📊 Статистика:")
        print(f"🟢 VLESS:  {vless}")
        print(f"🔵 VMESS:  {vmess}")
        print(f"🟡 Trojan: {trojan}")
        print(f"🟣 SS:     {ss}")
        print(f"📦 Всего:  {vless + vmess + trojan + ss}")
        
        print(f"\n📄 Первые 3 сервера:")
        for line in lines[:3]:
            if line.strip():
                print(line[:80] + "..." if len(line) > 80 else line)
        
        PYTHON_SCRIPT
        
    - name: Commit results
      run: |
        git config user.name "GitHub Actions"
        git config user.email "actions@github.com"
        git add proxypay.txt
        git diff --staged --quiet || git commit -m "🔄 Updated proxypay.txt"
        git push
