name: Decode to ProxyPay (Python)
on:
  workflow_dispatch:
  push:
    paths:
      - 'config.txt'
jobs:
  decode:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    
    steps:
    - uses: actions/checkout@v4
      
    - name: Decode with Python
      run: |
        python3 << 'PYTHON_SCRIPT'
        import base64
        import gzip
        import zlib
        import sys
        import bz2
        import lzma
        
        print("🔓 Декодирование Base64...")
        
        # Читаем файл
        with open('config.txt', 'r') as f:
            encoded = f.read().strip()
        
        print(f"📏 Размер закодированных данных: {len(encoded)} символов")
        
        # Декодируем Base64
        try:
            decoded_bytes = base64.b64decode(encoded)
        except Exception as e:
            print(f"❌ Ошибка декодирования Base64: {e}")
            sys.exit(1)
        
        print(f"📦 Размер после Base64: {len(decoded_bytes)} байт")
        print(f"🔍 Первые 16 байт (hex): {decoded_bytes[:16].hex()}")
        print(f"🔍 Первые 50 байт (raw): {decoded_bytes[:50]}")
        
        # Список методов для проверки
        methods = []
        
        # Метод 1: Обычный текст
        def try_plain(data):
            return data.decode('utf-8'), "Обычный Base64 текст"
        methods.append(try_plain)
        
        # Метод 2: Gzip
        def try_gzip(data):
            return gzip.decompress(data).decode('utf-8'), "Gzip"
        methods.append(try_gzip)
        
        # Метод 3: Zlib (с заголовком)
        def try_zlib(data):
            return zlib.decompress(data).decode('utf-8'), "Zlib"
        methods.append(try_zlib)
        
        # Метод 4: Zlib raw deflate
        def try_zlib_raw(data):
            return zlib.decompress(data, -zlib.MAX_WBITS).decode('utf-8'), "Zlib (raw deflate)"
        methods.append(try_zlib_raw)
        
        # Метод 5: Bzip2
        def try_bz2(data):
            return bz2.decompress(data).decode('utf-8'), "Bzip2"
        methods.append(try_bz2)
        
        # Метод 6: LZMA/XZ
        def try_lzma(data):
            return lzma.decompress(data).decode('utf-8'), "LZMA/XZ"
        methods.append(try_lzma)
        
        # Метод 7: Попробовать удалить возможный заголовок и распаковать
        def try_skip_header(data):
            for skip in [1, 2, 4, 8, 16]:
                try:
                    return zlib.decompress(data[skip:], -zlib.MAX_WBITS).decode('utf-8'), f"Zlib (пропуск {skip} байт)"
                except:
                    pass
            raise Exception("No valid offset found")
        methods.append(try_skip_header)
        
        # Пробуем все методы
        result = None
        method_name = None
        
        for method in methods:
            try:
                result, method_name = method(decoded_bytes)
                print(f"✅ Успешно: {method_name}")
                break
            except Exception as e:
                continue
        
        if not result:
            print("\n❌ Все методы декодирования не сработали")
            print("\n🔍 Диагностика:")
            print(f"- Это может быть зашифрованный файл")
            print(f"- Или использован неизвестный формат сжатия")
            print(f"- Или Base64 содержит не те данные")
            
            # Пробуем найти текстовые паттерны
            try:
                text_search = decoded_bytes.decode('utf-8', errors='ignore')
                if any(proto in text_search for proto in ['vless://', 'vmess://', 'trojan://', 'ss://']):
                    print("\n⚠️  Найдены текстовые паттерны прокси!")
                    print("Возможно, данные частично распакованы:")
                    result = text_search
                    method_name = "Частичное извлечение (с ошибками)"
            except:
                pass
            
            if not result:
                sys.exit(1)
        
        # Сохраняем
        with open('proxypay.txt', 'w', encoding='utf-8') as f:
            f.write(result)
        
        print(f"\n💾 Сохранено в proxypay.txt ({len(result)} символов)")
        
        # Статистика
        lines = [l.strip() for l in result.strip().split('\n') if l.strip()]
        vless = sum(1 for l in lines if l.startswith('vless://'))
        vmess = sum(1 for l in lines if l.startswith('vmess://'))
        trojan = sum(1 for l in lines if l.startswith('trojan://'))
        ss = sum(1 for l in lines if l.startswith('ss://'))
        
        print(f"\n📊 Статистика:")
        print(f"🟢 VLESS:  {vless}")
        print(f"🔵 VMESS:  {vmess}")
        print(f"🟡 Trojan: {trojan}")
        print(f"🟣 SS:     {ss}")
        print(f"📦 Всего:  {vless + vmess + trojan + ss}")
        
        if lines:
            print(f"\n📄 Первые 3 сервера:")
            for line in lines[:3]:
                preview = line[:100] + "..." if len(line) > 100 else line
                print(preview)
        
        PYTHON_SCRIPT
        
    - name: Commit results
      run: |
        git config user.name "GitHub Actions"
        git config user.email "actions@github.com"
        git add proxypay.txt
        git diff --staged --quiet || git commit -m "🔄 Updated proxypay.txt (method: Python)"
        git push
