name: Decode Base64 Config

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]
  workflow_dispatch:  # Ручной запуск
  schedule:
    - cron: '0 */6 * * *'  # Каждые 6 часов

jobs:
  decode-and-process:
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout repository
      uses: actions/checkout@v3
      
    - name: Decode Base64 config
      run: |
        echo "🔓 Декодирование Base64 конфигурации..."
        
        # Читаем Base64 из файла и декодируем
        base64 -d config.txt > decoded_config.txt
        
        echo "✅ Декодирование завершено"
        
    - name: Parse and format servers
      run: |
        echo "📋 Обработка серверов..."
        
        # Подсчет серверов
        vless_count=$(grep -c "^vless://" decoded_config.txt || true)
        vmess_count=$(grep -c "^vmess://" decoded_config.txt || true)
        trojan_count=$(grep -c "^trojan://" decoded_config.txt || true)
        
        echo "🌐 Найдено серверов:"
        echo "  - VLESS: $vless_count"
        echo "  - VMESS: $vmess_count"
        echo "  - Trojan: $trojan_count"
        echo "  - Всего: $((vless_count + vmess_count + trojan_count))"
        
        # Разделяем по типам
        grep "^vless://" decoded_config.txt > vless_servers.txt || true
        grep "^vmess://" decoded_config.txt > vmess_servers.txt || true
        grep "^trojan://" decoded_config.txt > trojan_servers.txt || true
        
    - name: Upload decoded config
      uses: actions/upload-artifact@v3
      with:
        name: decoded-configs
        path: |
          decoded_config.txt
          vless_servers.txt
          vmess_servers.txt
          trojan_servers.txt
        retention-days: 30
        
    - name: Create summary
      run: |
        echo "# 📊 Результаты декодирования" >> $GITHUB_STEP_SUMMARY
        echo "" >> $GITHUB_STEP_SUMMARY
        echo "## Статистика серверов" >> $GITHUB_STEP_SUMMARY
        echo "" >> $GITHUB_STEP_SUMMARY
        echo "| Тип | Количество |" >> $GITHUB_STEP_SUMMARY
        echo "|-----|------------|" >> $GITHUB_STEP_SUMMARY
        echo "| VLESS | $(grep -c "^vless://" decoded_config.txt || echo 0) |" >> $GITHUB_STEP_SUMMARY
        echo "| VMESS | $(grep -c "^vmess://" decoded_config.txt || echo 0) |" >> $GITHUB_STEP_SUMMARY
        echo "| Trojan | $(grep -c "^trojan://" decoded_config.txt || echo 0) |" >> $GITHUB_STEP_SUMMARY
        echo "" >> $GITHUB_STEP_SUMMARY
        echo "## Первые 5 серверов (превью)" >> $GITHUB_STEP_SUMMARY
        echo '```' >> $GITHUB_STEP_SUMMARY
        head -n 5 decoded_config.txt >> $GITHUB_STEP_SUMMARY || true
        echo '```' >> $GITHUB_STEP_SUMMARY
