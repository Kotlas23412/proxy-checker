name: Decode Base64 Config

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:  # Ручной запуск через UI
  schedule:
    - cron: '0 */6 * * *'  # Каждые 6 часов

jobs:
  decode-and-process:
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout repository
      uses: actions/checkout@v3
      
    - name: Decode Base64 config
      run: |
        echo "🔓 Декодирование Base64..."
        base64 -d config.txt > decoded_config.txt
        echo "✅ Готово!"
        
    - name: Count servers
      run: |
        echo "📊 Подсчет серверов..."
        vless=$(grep -c "^vless://" decoded_config.txt || echo 0)
        vmess=$(grep -c "^vmess://" decoded_config.txt || echo 0)
        trojan=$(grep -c "^trojan://" decoded_config.txt || echo 0)
        
        echo "VLESS: $vless"
        echo "VMESS: $vmess"
        echo "Trojan: $trojan"
        
        # Разделяем по типам
        grep "^vless://" decoded_config.txt > vless_servers.txt 2>/dev/null || true
        grep "^vmess://" decoded_config.txt > vmess_servers.txt 2>/dev/null || true
        grep "^trojan://" decoded_config.txt > trojan_servers.txt 2>/dev/null || true
        
    - name: Upload decoded configs
      uses: actions/upload-artifact@v3
      with:
        name: decoded-configs
        path: |
          decoded_config.txt
          vless_servers.txt
          vmess_servers.txt
          trojan_servers.txt
        retention-days: 30
