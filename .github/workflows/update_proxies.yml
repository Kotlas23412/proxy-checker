name: Update VLESS Proxies Hourly

on:
  schedule:
     - cron: '*/30 * * * *'
  workflow_dispatch:     # Позволяет запустить скрипт вручную по кнопке

permissions:
  contents: write        # Разрешение для бота на пуш коммитов в репозиторий

jobs:
  update-proxies:
    runs-on: ubuntu-latest
    
    steps:
      - name: 📥 Checkout repository
        uses: actions/checkout@v4

      - name: 🐍 Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.x'

      - name: ⚙️ Run proxy fetcher
        run: python fetch_proxies.py

      - name: 💾 Commit and push changes
        run: |
          git config --global user.name 'github-actions[bot]'
          git config --global user.email 'github-actions[bot]@users.noreply.github.com'
          git add proxies.txt
          
          # Проверяем, есть ли изменения. Если есть - делаем коммит
          git diff --quiet && git diff --staged --quiet || git commit -m "♻️ Автоматическое обновление прокси"
          git push
