name: Prepare IP/CIDR reference data hourly

on:
  schedule:
    - cron: '0 * * * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  prepare-reference-data:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.x'

      - name: Prepare local reference data
        run: python prepare_reference_data.py

      - name: Commit and push reference files
        run: |
          git config --global user.name 'github-actions[bot]'
          git config --global user.email 'github-actions[bot]@users.noreply.github.com'
          git add data/ip_list.txt data/cidr_list.txt data/sni_domains.txt

          git diff --quiet && git diff --staged --quiet || git commit -m "📦 Hourly reference data update"
          git pull --rebase origin "${GITHUB_REF_NAME}"
          git push
