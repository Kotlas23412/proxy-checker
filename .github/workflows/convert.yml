name: Process JSON Configs

on:
  push:
    paths:
      - 'configs.txt'
      - 'configs2.txt'
  workflow_dispatch:
  schedule:
    - cron: '0 */6 * * *'

permissions:
  contents: write

jobs:
  convert:
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout repository
      uses: actions/checkout@v3
        
    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.10'
        
    - name: Build Valid JSON Arrays
      run: |
        python3 << 'EOF'
        import json
        import os
        import re

        def process_config_file(input_file, output_file):
            if not os.path.exists(input_file):
                print(f"⚠️ {input_file} не найден")
                return

            with open(input_file, 'r', encoding='utf-8') as f:
                content = f.read().strip()

            if not content:
                print(f"⚠️ {input_file} пуст")
                return

            # Если файл начинается с vless://, это ссылки (на случай ошибки)
            if content.startswith('vless://'):
                print(f"ℹ️ {input_file} содержит VLESS ссылки, а не JSON.")
                # Тут можно оставить код конвертации из VLESS в JSON если нужно
                return

            # Если это JSON объекты, идущие друг за другом {..}{..}
            # Мы превращаем их в массив [ {..}, {..} ]
            try:
                # Пытаемся распарсить как один объект или массив сразу
                data = json.loads(content)
                if not isinstance(data, list):
                    data = [data]
            except json.JSONDecodeError:
                # Если ошибка, значит объекты склеены без запятых
                # Добавляем запятые между всеми } и {
                fixed_content = re.sub(r'}\s*{', '},{', content)
                if not fixed_content.startswith('['):
                    fixed_content = '[' + fixed_content + ']'
                try:
                    data = json.loads(fixed_content)
                except Exception as e:
                    print(f"❌ Ошибка парсинга JSON в {input_file}: {e}")
                    return

            with open(output_file, 'w', encoding='utf-8') as f:
                json.dump(data, f, indent=2, ensure_ascii=False)
            print(f"✅ Создан {output_file} (объектов: {len(data)})")

        process_config_file('configs.txt', 'vless_list.json')
        process_config_file('configs2.txt', 'vless_list2.json')
        EOF

    - name: Commit and Push
      run: |
        git config --local user.email "github-actions[bot]@users.noreply.github.com"
        git config --local user.name "github-actions[bot]"
        
        # Добавляем новые файлы
        git add vless_list.json vless_list2.json 2>/dev/null || true
        
        if git diff --staged --quiet; then
          echo "Нет изменений для коммита"
        else
          git commit -m "🔄 Сгенерирован vless_list.json из configs.txt [$(date +'%Y-%m-%d %H:%M:%S')]"
          git push
        fi
