name: Convert V2Ray Configs to VLESS Links

on:
  push:
    paths:
      - 'configs.txt'
      - 'configs2.txt'
  workflow_dispatch:
  schedule:
    - cron: '0 */6 * * *'

permissions:
  contents: write

jobs:
  convert:
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout repository
      uses: actions/checkout@v3
      with:
        persist-credentials: true
        fetch-depth: 2
        
    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.10'
    
    - name: Check what triggered the workflow
      id: trigger_check
      run: |
        if [ "${{ github.event_name }}" = "push" ]; then
          CHANGED_FILES=$(git diff --name-only HEAD^ HEAD)
          echo "Changed files: $CHANGED_FILES"
          if echo "$CHANGED_FILES" | grep -q "configs.txt\|configs2.txt"; then
            echo "triggered_by_config=true" >> $GITHUB_OUTPUT
            echo "✅ Triggered by configs.txt or configs2.txt update"
          else
            echo "triggered_by_config=false" >> $GITHUB_OUTPUT
          fi
        else
          echo "triggered_by_config=false" >> $GITHUB_OUTPUT
          echo "ℹ️ Triggered by: ${{ github.event_name }}"
        fi
        
    - name: Run conversion script
      run: python convert.py
      
    - name: Generate auto.json config
      run: |
        python3 << 'EOF'
        import json
        import base64
        from urllib.parse import urlparse, parse_qs
        import os
        
        def parse_vless_to_json(vless_url, index, apply_spoofing=False):
            """Конвертирует VLESS ссылку в JSON объект для V2Ray"""
            try:
                if not vless_url.startswith('vless://'):
                    return None
                    
                url = urlparse(vless_url.replace('vless://', 'http://'))
                params = parse_qs(url.query)
                
                protocol = url.scheme if url.scheme in ['vless', 'vmess', 'trojan', 'ss'] else 'vless'
                network = params.get('type', ['tcp'])[0]
                security = params.get('security', ['reality'])[0]
                
                if security == 'none' or security == '':
                    security = 'reality'
                if network in ['ws', 'httpupgrade'] and security == 'reality':
                    security = 'tls'
                
                # Базовая конфигурация прокси
                proxy_config = {
                    "tag": f"proxy-{index}",
                    "protocol": protocol,
                    "mux": {
                        "enabled": True,
                        "concurrency": -1,
                        "xudpConcurrency": 16,
                        "xudpProxyUDP443": "reject"
                    }
                }
                
                # Настройки пользователя
                user = {
                    "id": url.username or ""
                }
                
                if protocol == "vless":
                    user["encryption"] = "none"
                    if network == "tcp":
                        user["flow"] = "xtls-rprx-vision"
                
                # Настройки сервера
                if protocol in ["vless", "vmess"]:
                    proxy_config["settings"] = {
                        "vnext": [{
                            "address": url.hostname,
                            "port": url.port or 443,
                            "users": [user]
                        }]
                    }
                else:
                    proxy_config["settings"] = {
                        "servers": [{
                            "address": url.hostname,
                            "port": url.port or 443,
                            "password": url.username or ""
                        }]
                    }
                
                # Stream настройки
                stream = {
                    "network": network,
                    "security": security
                }
                
                # Настройки транспорта
                if network == "ws":
                    stream["wsSettings"] = {
                        "path": params.get('path', ['/'])[0],
                        "headers": {
                            "Host": params.get('host', [url.hostname])[0]
                        }
                    }
                elif network == "httpupgrade":
                    stream["httpupgradeSettings"] = {
                        "path": params.get('path', ['/'])[0],
                        "headers": {
                            "Host": params.get('host', [url.hostname])[0]
                        }
                    }
                elif network == "grpc":
                    stream["grpcSettings"] = {
                        "serviceName": params.get('serviceName', [''])[0]
                    }
                
                # TLS/Reality настройки
                sni = params.get('sni', [url.hostname])[0]
                tls_settings = {
                    "serverName": sni,
                    "fingerprint": "chrome"
                }
                
                if security == "reality":
                    tls_settings["publicKey"] = params.get('pbk', ['UsIT-zjeviusx9Av1bItm6yZiZCW56J1P1zvoQAOpU0'])[0]
                    tls_settings["shortId"] = params.get('sid', [''])[0]
                
                stream[f"{security}Settings"] = tls_settings
                proxy_config["streamSettings"] = stream
                
                return proxy_config
            except Exception as e:
                print(f"Error parsing VLESS URL: {e}")
                return None
        
        def create_auto_json(input_file, output_file, category_name="Auto Config", apply_spoofing=False):
            """Создает auto.json из файла с VLESS ссылками"""
            
            # Читаем VLESS ссылки
            try:
                with open(input_file, 'r', encoding='utf-8') as f:
                    vless_links = [line.strip() for line in f if line.strip().startswith('vless://')]
            except FileNotFoundError:
                print(f"File {input_file} not found, creating empty config")
                vless_links = []
            
            # Базовая конфигурация
            config = {
                "remarks": category_name,
                "burstObservatory": {
                    "pingConfig": {
                        "connectivity": "https://gu-st.ru/portal-st/favicon.svg",
                        "destination": "https://ssl.gstatic.com/ui/v1/icons/mail/rfr/noconnection/default_400.png",
                        "httpMethod": "HEAD",
                        "interval": "15m",
                        "sampling": 3,
                        "timeout": "3s"
                    },
                    "subjectSelector": ["proxy-"]
                },
                "dns": {
                    "queryStrategy": "UseIPv4",
                    "disableFallback": True,
                    "servers": [
                        {
                            "address": "77.88.8.8",
                            "detour": "direct",
                            "tag": "dns-ru",
                            "domains": [
                                "geosite:category-ru",
                                "domain:magnit.ru",
                                "domain:tander.ru",
                                "regexp:.*\\.magnit$",
                                "regexp:.*\\.tander$",
                                "regexp:.*tander.*magnit.*",
                                "domain:yandex.ru"
                            ]
                        },
                        {
                            "address": "https://dns.google/dns-query",
                            "detour": "loop-stream-direct",
                            "tag": "dns-stream",
                            "domains": ["geosite:youtube", "geosite:instagram", "geosite:tiktok"]
                        },
                        {
                            "address": "https://cloudflare-dns.com/dns-query",
                            "detour": "loop-ai-direct",
                            "tag": "dns-ai",
                            "domains": ["geosite:openai", "domain:chatgpt.com"]
                        },
                        {
                            "address": "https://cloudflare-dns.com/dns-query",
                            "detour": "proxy-0",
                            "tag": "dns-default"
                        },
                        {"address": "1.1.1.1", "detour": "direct"}
                    ]
                },
                "inbounds": [
                    {
                        "listen": "127.0.0.1",
                        "port": 10808,
                        "protocol": "socks",
                        "settings": {"udp": True},
                        "sniffing": {
                            "destOverride": ["http", "tls", "quic"],
                            "enabled": True,
                            "routeOnly": True
                        },
                        "tag": "socks"
                    },
                    {
                        "listen": "127.0.0.1",
                        "port": 10809,
                        "protocol": "http",
                        "sniffing": {
                            "destOverride": ["http", "tls", "quic"],
                            "enabled": True,
                            "routeOnly": True
                        },
                        "tag": "http"
                    }
                ],
                "outbounds": [],
                "routing": {
                    "domainMatcher": "hybrid",
                    "domainStrategy": "AsIs",
                    "balancers": [{
                        "tag": "balancer-main",
                        "fallbackTag": "proxy-0",
                        "selector": ["proxy-"],
                        "strategy": {
                            "type": "leastLoad",
                            "settings": {
                                "expected": 1,
                                "maxRTT": "5s",
                                "tolerance": 0.5,
                                "baselines": ["800ms", "2000ms"]
                            }
                        }
                    }],
                    "rules": [
                        {"network": "udp", "port": "443", "outboundTag": "block", "type": "field"},
                        {"protocol": ["bittorrent"], "outboundTag": "block", "type": "field"},
                        {"ip": ["geoip:private", "geoip:ru"], "outboundTag": "direct", "type": "field"},
                        {
                            "domain": [
                                "full:ru.tander.magnit",
                                "domain:tander.ru",
                                "domain:magnit.ru",
                                "regexp:.*\\.tander\\..*",
                                "regexp:.*tander.*magnit.*",
                                "regexp:.*magnit.*tander.*"
                            ],
                            "outboundTag": "direct",
                            "type": "field"
                        },
                        {
                            "domain": ["geosite:category-ru", "regexp:.*\\.ru$", "regexp:.*\\.рф$"],
                            "outboundTag": "direct",
                            "type": "field"
                        },
                        {"inboundTag": ["REROUTE-STREAM", "REROUTE-AI"], "balancerTag": "balancer-main", "type": "field"},
                        {"domain": ["geosite:openai"], "outboundTag": "loop-ai-direct", "type": "field"},
                        {
                            "domain": ["geosite:youtube", "geosite:instagram", "domain:netflix.com"],
                            "outboundTag": "loop-stream-direct",
                            "type": "field"
                        },
                        {"network": "tcp,udp", "balancerTag": "balancer-main", "type": "field"}
                    ]
                }
            }
            
            # Парсим и добавляем прокси
            for idx, vless_link in enumerate(vless_links):
                proxy = parse_vless_to_json(vless_link, idx, apply_spoofing)
                if proxy:
                    config["outbounds"].append(proxy)
            
            # Добавляем служебные outbounds
            config["outbounds"].extend([
                {
                    "tag": "direct",
                    "protocol": "freedom",
                    "streamSettings": {"sockopt": {"domainStrategy": "ForceIPv4"}}
                },
                {"tag": "block", "protocol": "blackhole"},
                {
                    "tag": "loop-stream-direct",
                    "protocol": "loopback",
                    "settings": {"inboundTag": "REROUTE-STREAM"}
                },
                {
                    "tag": "loop-ai-direct",
                    "protocol": "loopback",
                    "settings": {"inboundTag": "REROUTE-AI"}
                }
            ])
            
            # Сохраняем JSON
            with open(output_file, 'w', encoding='utf-8') as f:
                json.dump([config], f, indent=2, ensure_ascii=False)
            
            print(f"✅ Created {output_file} with {len(vless_links)} proxies")
        
        # Создаем auto.json из output.txt
        if os.path.exists('output.txt'):
            create_auto_json('output.txt', 'auto.json', 'Main Servers')
        else:
            print("⚠️ output.txt not found")
        
        # Опционально: создаем auto2.json из output2.txt если он существует
        if os.path.exists('output2.txt'):
            create_auto_json('output2.txt', 'auto2.json', 'Secondary Servers', apply_spoofing=True)
        else:
            print("⚠️ output2.txt not found, skipping auto2.json")
        
        EOF
    
    - name: Display trigger information
      run: |
        echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"
        echo "📋 Workflow Execution Summary"
        echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"
        echo "🎯 Triggered by: ${{ github.event_name }}"
        echo "⚡ Config file updated: ${{ steps.trigger_check.outputs.triggered_by_config }}"
        echo "📅 Time: $(date +'%Y-%m-%d %H:%M:%S UTC')"
        echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"
        
        if [ -f output.txt ]; then
          echo "📊 output.txt lines: $(wc -l < output.txt)"
        fi
        
        if [ -f output2.txt ]; then
          echo "📊 output2.txt lines: $(wc -l < output2.txt)"
        fi
        
        if [ -f auto.json ]; then
          echo "✅ auto.json created successfully"
        fi
        
        if [ -f auto2.json ]; then
          echo "✅ auto2.json created successfully"
        fi
        echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"
        
    - name: Check for changes
      id: verify_diff
      run: |
        git diff --quiet output.txt output.json output2.txt auto.json auto2.json 2>/dev/null || echo "changed=true" >> $GITHUB_OUTPUT
        
    - name: Commit and push changes
      if: steps.verify_diff.outputs.changed == 'true'
      run: |
        git config --local user.email "github-actions[bot]@users.noreply.github.com"
        git config --local user.name "github-actions[bot]"
        git add output.txt output.json output2.txt auto.json auto2.json 2>/dev/null || true
        
        COMMIT_MSG="🔄 Update VLESS configs + auto.json [$(date +'%Y-%m-%d %H:%M:%S')]"
        
        if [ "${{ steps.trigger_check.outputs.triggered_by_config }}" = "true" ]; then
          COMMIT_MSG="⚡ Auto-update triggered by configs.txt change [$(date +'%Y-%m-%d %H:%M:%S')]"
        fi
        
        git commit -m "$COMMIT_MSG" || echo "No changes to commit"
        git push || echo "Nothing to push"
    
    - name: Workflow completion notification
      if: always()
      run: |
        if [ "${{ steps.verify_diff.outputs.changed }}" = "true" ]; then
          echo "✅ Workflow completed successfully - Changes committed and pushed"
        else
          echo "ℹ️ Workflow completed - No changes detected"
        fi
