name: Convert JSON to Links and Back

on:
  # Обратите внимание: триггер push на файлы configs больше не будет работать автоматически,
  # так как эти файлы теперь лежат в другом (приватном) репозитории.
  # Экшен будет запускаться по расписанию (каждые 6 часов) или вручную.
  workflow_dispatch:
  schedule:
    - cron: '0 */6 * * *'

permissions:
  contents: write

jobs:
  convert:
    runs-on: ubuntu-latest
    
    steps:
    # Шаг 1: Скачиваем приватный репозиторий вместо текущего публичного
    - name: Checkout private repository
      uses: actions/checkout@v3
      with:
        # Укажите здесь ваш никнейм на GitHub и имя ПРИВАТНОГО репозитория
        repository: 'Kotlas23412/listproxy'
        # Передаем созданный ранее секретный токен доступа
        token: ${{ secrets.PRIVATE_REPO_TOKEN }}
        
    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.10'
        
    - name: Process Configs
      run: |
        python3 << 'EOF'
        import json
        import os
        import re
        from urllib.parse import urlencode, quote

        def json_to_vless(obj):
            try:
                outbound = obj['outbounds'][0]
                user = outbound['settings']['vnext'][0]['users'][0]
                server = outbound['settings']['vnext'][0]
                stream = outbound['streamSettings']
                
                uuid = user['id']
                addr = server['address']
                port = server['port']
                
                params = {
                    "type": stream.get('network', 'tcp'),
                    "security": stream.get('security', 'none'),
                }
                
                if params['security'] == 'reality':
                    r_settings = stream.get('realitySettings', {})
                    params.update({
                        "sni": r_settings.get('serverName', ''),
                        "pbk": r_settings.get('publicKey', ''),
                        "sid": r_settings.get('shortId', ''),
                        "fp": r_settings.get('fingerprint', 'chrome'),
                        "flow": user.get('flow', '')
                    })
                
                remark = obj.get('remarks', 'Unnamed')
                query = urlencode({k: v for k, v in params.items() if v})
                return f"vless://{uuid}@{addr}:{port}?{query}#{quote(remark)}"
            except Exception as e:
                return None

        def process_file(input_file, json_output, link_output):
            if not os.path.exists(input_file):
                print(f"Файл {input_file} не найден в приватном репозитории")
                return

            with open(input_file, 'r', encoding='utf-8') as f:
                content = f.read().strip()
            
            fixed_content = re.sub(r'}\s*{', '},{', content)
            if not fixed_content.startswith('['):
                fixed_content = '[' + fixed_content + ']'
            
            try:
                data = json.loads(fixed_content)
            except:
                print(f"Ошибка в файле {input_file}")
                return

            with open(json_output, 'w', encoding='utf-8') as f:
                json.dump(data, f, indent=2, ensure_ascii=False)
            
            links = []
            for item in data:
                link = json_to_vless(item)
                if link:
                    links.append(link)
            
            with open(link_output, 'w', encoding='utf-8') as f:
                f.write('\n'.join(links))
            
            print(f"✅ Обработан {input_file}: Создано {len(links)} ссылок")

        process_file('configs.txt', 'vless_full.json', 'vless_links.txt')
        process_file('configs2.txt', 'vless_full2.json', 'vless_links2.txt')
        EOF

    # Шаг 3: Сохраняем изменения обратно в ПРИВАТНЫЙ репозиторий
    - name: Commit and Push to Private Repo
      run: |
        git config --local user.email "github-actions[bot]@users.noreply.github.com"
        git config --local user.name "github-actions[bot]"
        
        git add vless_full.json vless_links.txt vless_full2.json vless_links2.txt 2>/dev/null || true
        
        if git diff --staged --quiet; then
          echo "No changes"
        else
          git commit -m "🔄 Update VLESS: JSON and Links [$(date +'%Y-%m-%d %H:%M:%S')]"
          git push
        fi
