name: Filter VLESS by IP/CIDR hourly

on:
  workflow_run:
    workflows: ["Prepare IP/CIDR reference data hourly"]
    types:
      - completed
  workflow_dispatch:

permissions:
  contents: write

jobs:
  filter-vless:
    if: ${{ github.event_name == 'workflow_dispatch' || github.event.workflow_run.conclusion == 'success' }}
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.x'

      - name: Prepare local reference data
        run: python prepare_reference_data.py

      - name: Run filter script
        run: python filter_vless_by_ip.py

      - name: Commit and push changes
        run: |
          git config --global user.name 'github-actions[bot]'
          git config --global user.email 'github-actions[bot]@users.noreply.github.com'
          git add filtered_vless.txt

          if git diff --quiet && git diff --staged --quiet; then
            echo "No changes to commit"
            exit 0
          fi

          git commit -m "🔎 Hourly filtered VLESS update"

          # Rebase onto latest remote to avoid non-fast-forward failures
          git pull --rebase origin "${GITHUB_REF_NAME:-main}"
          git push origin "${GITHUB_REF_NAME:-main}"
